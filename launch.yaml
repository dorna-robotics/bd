# bd — launch config.
#
# Rack slot D5 holds the OPEN reservoir tube every dose is drawn from, so
# it is never processed — 19 of the 20 slots are available.

project_name: bd
port:         5010
scene:        [scene/core_500.j2, scene/layout.j2]
recipes:      recipes.j2
actions:      actions.py
checks:       checks.py

plan_window:  4
scheduler:    cpsat

kwargs:
  tube_count:
    type: int
    default: 1
    label: Tubes to process
    hint: How many tubes to run. D5 is the reservoir, so 19 slots are available.
    min: 1
    max: 19
  print_label:
    type: bool
    default: false
    label: Print label
    hint: Print and apply a barcode label on each tube (on the printer, right after the pick) before it is decapped. Off skips the printer entirely.
