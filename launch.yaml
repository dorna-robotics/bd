# bd — launch config.
#
# Per tube: pick → decap (cap parked at its own index on the cap holder)
# → tube back → pipettor: fresh tip → aspirate from the D5 reservoir →
# dispense → tip to waste → re-cap the tube → weigh on the scale →
# camera → barcode → return it. Every measurement is therefore taken on
# the finished, capped tube. tube_count sets how many tubes to run.
#
# Rack slot D5 holds the OPEN reservoir tube every dose is drawn from, so
# it is never processed — 19 of the 20 slots are available.

project_name: bd
port:         5010
scene:        [scene/core_500.j2, scene/layout.j2]
recipes:      recipes.j2
actions:      actions.py
checks:       checks.py

plan_window:  4
scheduler:    cpsat

kwargs:
  tube_count:
    type: int
    default: 1
    label: Tubes to process
    hint: How many tubes to run (pick → decap → dispense → cap → weigh → camera → barcode → return). D5 is the reservoir, so 19 slots are available.
    min: 1
    max: 19
